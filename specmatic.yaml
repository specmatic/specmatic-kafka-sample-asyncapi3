version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/orderAsyncService"
    runOptions:
      $ref: "#/components/runOptions/orderAsyncServiceTest"
    data:
      examples:
        - directories:
            - "${EX_DIR:examples}"

dependencies:
  services:
    - service:
        $ref: "#/components/services/taxService"
        runOptions:
          $ref: "#/components/runOptions/taxServiceMock"
        data:
          examples:
            - directories:
                - "${EX_DIR:examples}"

components:
  sources:
    specmaticOrderContracts:
      filesystem:
        directory: .
  services:
    orderAsyncService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/specmaticOrderContracts"
            specs:
              - specs/async-order-service.yaml
    taxService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/specmaticOrderContracts"
            specs:
              - specs/tax-service.yaml
  runOptions:
    orderAsyncServiceTest:
      asyncapi:
        type: test
        servers:
          - host: "${KAFKA_BROKER_HOST:localhost:9092}"
            protocol: kafka
            # Optional broker-level admin properties used by Specmatic to manage topics.
            # Example keys: security.protocol, sasl.mechanism, sasl.jaas.config.
            # adminCredentials:
            #   security.protocol: SASL_PLAINTEXT
            #   sasl.mechanism: PLAIN
            # Optional Kafka client properties for test consumers and producers.
            # client:
            #   consumer:
            #     group.id: specmatic-tests
            #   producer:
            #     acks: all
        # Optional wait time in milliseconds before tests begin, to allow subscribers to connect.
        # subscriberReadinessWaitTime: 5000
        # Optional timeout in milliseconds to wait for a reply message on the reply topic.
        # replyTimeout: 10000
    taxServiceMock:
      openapi:
        type: mock
        baseUrl: "${TAX_SERVICE_URL:http://0.0.0.0:8090}"
